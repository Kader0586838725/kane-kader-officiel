 <!DOCTYPE! html>
 <html>
 <head>
 <title>Calculatrice 2026</title>
 <style>
body{
font-family: Arial, sans serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
margin: 0;
padding: 20px;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-containt: center;
}
h1{
text-align: center;
color: #fff;
text-shadow: 2px 4px rgba(0,0,0,0.3);
margin-bottom: 10px
}
p{
text-align: center;
color: #fff;
opaciti: 0.9;
margin-bottom: 30px;
}
.calculatrice{
background: #2c3e50;
padding: 0.9;
border-radius: 15px;
box-shadow: 0 10px 30px rgba(0,0,0,0.3);
width: 300px;
}
#ecran{
width: 100%;
height: 60px;
font-size: 32px;
text-align: right;
margin-bottom: 32px;
padding: 15px;
border: none;
background: #34495e;
color: #fff;
box-sizing: border-box;
}
.boutons{
diplay: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
}
button{
height: 60px;
font-size: 20px;
border: none;
border-radius: 8px;
cursor: pointer;
font-weight: bold;
transition: 0.2s;
}
.chiffre{
background: #34495e;
color: #fff
}
.chiffre:hover {
background: #4a5f7a;
}
.operation{
background: #e67e22;
color: #fff;
}
.operation:hover{
background: #d35400;
}
.egal{
background: #2ecc71;
color: #fff;
grid-colum: span 2;
}
.egal:hover{
background: #27ae60;
}
.clear{
background: #e74c3c;
color: #fff;
}
.clear:hover{
background: #c0392b;
}
</style>
</head>
 <body>
<h1>Calculatrice 2026</h1>
<p>Objectif : Maîtriser JAvaScript avant 2026</p>
<div class="calcultrice">
<input type="text" id="ecran" readonly>

<div class="boutons">
<button class="clear" onclick="effacer()">C</button>
<button class="operation" conclik="ajouter('/')">/</button>
<button class="operation" conclik="ajouter('*')">*</button>
<button class="operation" conclik="ajouter('-')">-</button>

<button class="chiffre" conclik="ajouter('7')">7</button>
<button class="chiffre" conclik="ajouter('8')">8</button>
<button class="chiffre" conclik="ajouter('9')">9</button>
<button class="operation" conclik="ajouter('+')">+</button>

<button class="chiffre" conclik="ajouter('4')">4</button>
<button class="chiffre" conclik="ajouter('5')">5</button>
<button class="chiffre" conclik="ajouter('6')">6</button>
<button class="operation" conclik="ajouter('.')">.</button>

<button class="chiffre" conclik="ajouter('1')">1</button>
<button class="chiffre" conclik="ajouter('2')">2</button>
<button class="chiffre" conclik="ajouter('3')">3</button>
<button class="operation" conclik="ajouter('0')">0</button>

<button class="egal" conclik="calculer()">=</button>

  </div>
</div>
</body>
<script> 
let ecran = document.getElementById('ecran');

function ajouter(valeur){
ecran.value += value;
}
function calculer(){
try{
ecran.value = eval(ecran.value);
}catch (erreur){
ecran.value = 'Erreur';
}
}
function effacer() {
ecran.value ='';
}
</script>
</html>
